<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <div class="navbar-nav flex-row gap-3">
      <a class="nav-link active" href="index.html">Trade</a>
      <a class="nav-link" href="analytics.html">Analytics</a>
    </div>
  </div>
</nav>

<div class="container mt-3">
  <div class="row">

    <!-- Left -->
    <div class="col-md-4">
      <ul class="list-group" id="stock-list" data-testid="stock-list">
        <li class="list-group-item stock-item" data-ticker="MSFT" data-name="Microsoft">MSFT: Microsoft</li>
        <li class="list-group-item stock-item" data-ticker="GOOGL" data-name="Alphabet">GOOGL: Alphabet</li>
        <li class="list-group-item stock-item" data-ticker="AMZN" data-name="Amazon">AMZN: Amazon</li>
        <li class="list-group-item stock-item" data-ticker="AAPL" data-name="Apple">AAPL: Apple</li>
        <li class="list-group-item stock-item" data-ticker="META" data-name="Meta">META: Meta</li>
        <li class="list-group-item stock-item" data-ticker="WMT" data-name="Walmart">WMT: Walmart</li>
        <li class="list-group-item stock-item" data-ticker="JPM" data-name="JPMorgan Chase">JPM: JPMorgan Chase</li>
        <li class="list-group-item stock-item" data-ticker="V" data-name="Visa">V: Visa</li>
        <li class="list-group-item stock-item" data-ticker="JNJ" data-name="Johnson & Johnson">JNJ: Johnson & Johnson</li>
        <li class="list-group-item stock-item" data-ticker="ORCL" data-name="Oracle">ORCL: Oracle</li>
        <li class="list-group-item stock-item" data-ticker="ABBV" data-name="AbbVie Inc.">ABBV: AbbVie Inc.</li>
      </ul>
    </div>

    <!-- Right -->
    <div class="col-md-8">
      <div id="trade-panel" class="border rounded p-3 d-none">
        <h5 id="trade-title"></h5>
        <p>Market price: $<span id="stock-price" data-testid="stock-price"></span></p>

        <div class="mb-2">
          <label for="limit-price">Limit Price</label>
          <input id="limit-price" type="number" class="form-control">
          <div class="error-message" id="price-error" data-testid="price-error"></div>
        </div>

        <div class="mb-2">
          <label for="quantity">Quantity</label>
          <input id="quantity" type="text" class="form-control">
          <div class="error-message" id="qty-error" data-testid="qty-error"></div>
        </div>

        <div class="mb-2">
          <label for="value">Value</label>
          <input id="value" type="text" class="form-control" readonly>
        </div>

        <button id="buy-btn" class="btn btn-success me-2">Buy</button>
        <button id="sell-btn" class="btn btn-danger">Sell</button>

        <div class="error-message mt-2" id="action-error" data-testid="action-error"></div>
      </div>
    </div>

  </div>
</div>

<div class="container mt-4">
  <h4>Portfolio</h4>
  <div class="mb-2">
    Cash: $<span id="cash" data-testid="cash"></span>
  </div>

  <table class="table table-bordered" id="portfolio-table" data-testid="portfolio-table">
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Quantity</th>
        <th>Avg Price</th>
        <th>Total Value</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="app.js"></script>
<script src="non-existing.js"></script>
<script>throw new Error('something happened')</script>
</body>
</html>
